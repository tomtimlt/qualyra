services:
  app:
    build: .
    image: ai-assistant
    container_name: ai-assistant
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_vendor:/app/vendor
    environment:
      APP_URL: http://localhost:8000
    restart: unless-stopped

volumes:
  app_node_modules:
  app_vendor:
