services:
  vitrine:
    build: .
    image: qualyra-vitrine
    container_name: qualyra-vitrine
    ports:
      - "8080:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      # Secret lu depuis vitrine/.env — build échoue volontairement s'il manque
      VITRINE_ADMIN_PASSWORD: ${VITRINE_ADMIN_PASSWORD:?Definir VITRINE_ADMIN_PASSWORD dans vitrine/.env}
      VITRINE_CONTACT_EMAIL: ${VITRINE_CONTACT_EMAIL:-contact@qualyra.app}
      # Umami : à renseigner après la 1re config (pas besoin de rebuild, juste 'up -d')
      VITRINE_UMAMI_SRC: ${VITRINE_UMAMI_SRC:-}
      VITRINE_UMAMI_WEBSITE_ID: ${VITRINE_UMAMI_WEBSITE_ID:-}
      VITRINE_UMAMI_DASHBOARD: ${VITRINE_UMAMI_DASHBOARD:-}
    volumes:
      - vitrine_db:/app/database
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: qualyra-umami
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?Definir UMAMI_APP_SECRET dans vitrine/.env}
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

  umami-db:
    image: postgres:15-alpine
    container_name: qualyra-umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  vitrine_db:
  umami_pg:
