name: Sync Check

on:
  pull_request:
    branches: [dev]
    paths:
      - "config/ai_act_rules.php"
      - "config/questionnaire.php"
      - "config/report_templates.php"
      - "database/seeders/*"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: sqlite

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Check sync
        id: check
        continue-on-error: true
        run: ./scripts/check-sync.sh

      - name: Comment PR on failure
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/dev/stdin', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Sync Check failed** — config/ et DemoSeeder sont désynchronisés.\n\nExécute `./scripts/check-sync.sh` localement pour voir le détail.'
            });

      - name: Fail if sync check failed
        if: steps.check.outcome == 'failure'
        run: exit 1
