name: Security

on:
  schedule:
    - cron: "0 8 * * 1" # tous les lundis à 8h UTC
  pull_request:
    paths:
      - "composer.lock"
      - "package-lock.json"

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: Composer audit
        run: |
          composer install --no-interaction --no-dev
          composer audit

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit
        run: |
          npm ci --no-audit --no-fund
          npm audit --omit=dev
