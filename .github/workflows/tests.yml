name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: sqlite, gd, intl, bcmath, zip, exif
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Setup environment
        run: |
          cp .env.example .env
          # Retire la ligne DB_DATABASE de .env.example qui pointe vers /app/database/...
          # (chemin Docker absolu inadequat en CI). Laravel utilise alors le default
          # database_path('database.sqlite') resolu relativement au workspace CI.
          sed -i '/^DB_DATABASE=/d' .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Migrate and seed
        run: |
          php artisan migrate --force
          php artisan db:seed --force

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: php artisan test
